const STORAGE_PREFIX = 'fitness_tracker:';
const QUEUE_KEY = 'fitness_tracker_queue';

// Maps legacy key prefixes -> API endpoints
const KEY_MAP = [
  { prefix: 'meal:',    api: '/api/meals' },
  { prefix: 'weigh:',   api: '/api/weighIns' },
  { prefix: 'workout:', api: '/api/workouts' },
  { prefix: 'yoga:',    api: '/api/yoga' },
  { prefix: 'walk:',    api: '/api/mobility' },
  { prefix: 'recipe:',  api: '/shared/recipes' },
  { prefix: 'route:',   api: '/shared/routes' },
];

function routeForKey(key) {
  for (const m of KEY_MAP) {
    if (key.startsWith(m.prefix)) {
      return { path: m.api + '/' + encodeURIComponent(key.slice(m.prefix.length)), wrap: false };
    }
  }
  if (key === 'custom_exercises') {
    return { path: '/api/customExercises/main', wrap: true };
  }
  if (key === 'user_targets') {
    return { path: '/api/goals/targets', wrap: true };
  }
  return null; // meta:* and anything else stays local-only
}

async function authedFetch(path, options = {}) {
  const user = firebase.auth().currentUser;
  if (!user) throw new Error('Not signed in');
  const token = await user.getIdToken();
  const res = await fetch(API_BASE + path, {
    ...options,
    headers: {
      Authorization: 'Bearer ' + token,
      'Content-Type': 'application/json',
      ...(options.headers || {}),
    },
  });
  if (!res.ok) {
    let msg = res.status;
    try { msg += ': ' + JSON.stringify(await res.json()); } catch (e) {}
    throw new Error('API ' + msg);
  }
  return res.json();
}

// ---- Offline write queue ----
function readQueue() {
  try { return JSON.parse(localStorage.getItem(QUEUE_KEY)) || []; } catch (e) { return []; }
}
function writeQueue(q) { localStorage.setItem(QUEUE_KEY, JSON.stringify(q)); }

function enqueue(op) {
  const q = readQueue();
  // newest write for a path wins; drop older ops for the same path
  writeQueue(q.filter((o) => o.path !== op.path).concat(op));
}

async function flushQueue() {
  let q = readQueue();
  if (!q.length || !navigator.onLine) return;
  const remaining = [];
  for (const op of q) {
    try {
      await authedFetch(op.path, { method: op.method, body: op.body });
    } catch (e) {
      remaining.push(op); // keep for next flush
    }
  }
  writeQueue(remaining);
}
window.addEventListener('online', () => { flushQueue(); });

async function apiWrite(method, path, body) {
  const op = { method, path, body: body ? JSON.stringify(body) : undefined };
  if (!navigator.onLine) { enqueue(op); return; }
  try {
    await authedFetch(path, { method, body: op.body });
  } catch (e) {
    console.warn('API write queued after failure:', e.message);
    enqueue(op);
  }
}

// ---- Cache-backed storage (same interface as before) ----
const storage = {
  async get(key) {
    const raw = localStorage.getItem(STORAGE_PREFIX + key);
    if (raw === null) return null;
    return { key, value: raw, shared: false };
  },
  async set(key, value) {
    localStorage.setItem(STORAGE_PREFIX + key, value);
    const route = routeForKey(key);
    if (route) {
      let body = JSON.parse(value);
      if (route.wrap) body = { data: body };
      apiWrite('PUT', route.path, body);
    }
    return { key, value, shared: false };
  },
  async delete(key) {
    localStorage.removeItem(STORAGE_PREFIX + key);
    const route = routeForKey(key);
    if (route && !route.wrap) apiWrite('DELETE', route.path);
    return { key, deleted: true, shared: false };
  },
  async list(prefix = '') {
    const keys = [];
    const fullPrefix = STORAGE_PREFIX + prefix;
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith(fullPrefix)) {
        keys.push(k.substring(STORAGE_PREFIX.length));
      }
    }
    return { keys, prefix, shared: false };
  },
};

// ---- Full sync: server -> cache (runs after sign-in, before app mounts) ----
async function syncFromServer() {
  if (!navigator.onLine) return; // offline: serve from cache

  const pulls = KEY_MAP.map(async (m) => {
    const data = await authedFetch(m.api);
    return { prefix: m.prefix, items: data.items || [] };
  });
  const results = await Promise.all(pulls);
  const custom = await authedFetch('/api/customExercises').catch(() => ({ items: [] }));
  const goals = await authedFetch('/api/goals').catch(() => ({ items: [] }));

  // Remove stale cached entries for synced prefixes, then repopulate
  const staleKeys = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (!k || !k.startsWith(STORAGE_PREFIX)) continue;
    const bare = k.substring(STORAGE_PREFIX.length);
    if (KEY_MAP.some((m) => bare.startsWith(m.prefix)) || bare === 'custom_exercises' || bare === 'user_targets') {
      staleKeys.push(k);
    }
  }
  staleKeys.forEach((k) => localStorage.removeItem(k));

  for (const r of results) {
    for (const item of r.items) {
      const { createdAt, updatedAt, ...doc } = item;
      localStorage.setItem(STORAGE_PREFIX + r.prefix + item.id, JSON.stringify(doc));
    }
  }
  const main = (custom.items || []).find((d) => d.id === 'main');
  if (main && main.data) {
    localStorage.setItem(STORAGE_PREFIX + 'custom_exercises', JSON.stringify(main.data));
  }
  const targetsDoc = (goals.items || []).find((d) => d.id === 'targets');
  if (targetsDoc && targetsDoc.data) {
    localStorage.setItem(STORAGE_PREFIX + 'user_targets', JSON.stringify(targetsDoc.data));
  }
}

// Order the 4-day cycle advances in
const WORKOUT_CYCLE = ['A', 'B', 'C', 'D'];

const DAILY_CAL_TARGET = 2100;
const DAILY_PROTEIN_TARGET = 150;
// Average stride for a 5'9" adult walking — ~2.2 feet = 2400 steps/mile
const STEPS_PER_MILE = 2400;

// Build a clean demo search URL for a given exercise name.
// YouTube search by name never rots and lets you pick the demonstration you like.
function demoUrl(exName) {
  const q = encodeURIComponent(exName + ' proper form how to');
  return `https://www.youtube.com/results?search_query=${q}`;
}

const STARTER_ROUTES = [
  { id: 'rt1', name: 'Neighborhood loop', miles: 3.0, minutes: 55, notes: 'Standard daily walk with wife' },
  { id: 'rt2', name: 'Long loop', miles: 4.2, minutes: 75, notes: 'Weekend extended version' },
  { id: 'rt3', name: 'Quick out-and-back', miles: 2.0, minutes: 35, notes: 'Short day, still counts' },
];

function localDateStr(d = new Date()) {
  // Date in the user's LOCAL timezone (toISOString would give UTC,
  // which rolls to "tomorrow" at 8pm ET and breaks evening logging)
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function todayStr() {
  return localDateStr();
}

function dateStrOffset(baseStr, offsetDays) {
  const d = new Date(baseStr + 'T12:00:00');
  d.setDate(d.getDate() + offsetDays);
  return localDateStr(d);
}

function humanDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const today = todayStr();
  const yesterday = dateStrOffset(today, -1);
  if (dateStr === today) return 'Today';
  if (dateStr === yesterday) return 'Yesterday';
  return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}

function FitnessTracker() {
  const [view, setView] = useState('home');
  const [loading, setLoading] = useState(true);
  const [selectedDate, setSelectedDate] = useState(todayStr());
  const [workoutLogs, setWorkoutLogs] = useState([]);
  const [walkLogs, setWalkLogs] = useState([]);
  const [yogaLogs, setYogaLogs] = useState([]);
  const [weighIns, setWeighIns] = useState([]);
  const [mealLogs, setMealLogs] = useState([]);
  const [recipes, setRecipes] = useState([]);
  const [routes, setRoutes] = useState([]);
  const [customExercises, setCustomExercises] = useState({}); // { A: [exDef], B: [...], ... }
  const [activeWorkout, setActiveWorkout] = useState(null);
  const [activeSession, setActiveSession] = useState(null);
  const [targets, setTargets] = useState({ calories: DAILY_CAL_TARGET, protein: DAILY_PROTEIN_TARGET, carbs: 0 });

  const saveTargets = async (t) => {
    const clean = {
      calories: Math.max(0, parseInt(t.calories) || 0),
      protein: Math.max(0, parseInt(t.protein) || 0),
      carbs: Math.max(0, parseInt(t.carbs) || 0), // 0 = no carb limit
    };
    setTargets(clean);
    await storage.set('user_targets', JSON.stringify(clean));
  };

  // Load data from persistent storage
  useEffect(() => {
    async function loadData() {
      try {
        const keys = await storage.list('');
        const keyList = keys?.keys || [];

        const savedTargets = await storage.get('user_targets');
        if (savedTargets?.value) {
          try {
            const t = JSON.parse(savedTargets.value);
            if (t.calories || t.protein || t.carbs) setTargets({
              calories: t.calories || DAILY_CAL_TARGET,
              protein: t.protein || DAILY_PROTEIN_TARGET,
              carbs: t.carbs || 0,
            });
          } catch (e) {}
        }

        const workouts = [];
        const walks = [];
        const yogas = [];
        const weights = [];
        const meals = [];
        const recipesFromStorage = [];
        const routesFromStorage = [];
        let customExercisesFromStorage = {};
        let seedFlag = null;

        for (const key of keyList) {
          try {
            const result = await storage.get(key);
            if (!result) continue;
            const data = JSON.parse(result.value);
            if (key.startsWith('workout:')) workouts.push(data);
            else if (key.startsWith('walk:')) walks.push(data);
            else if (key.startsWith('yoga:')) yogas.push(data);
            else if (key.startsWith('weigh:')) weights.push(data);
            else if (key.startsWith('meal:')) meals.push(data);
            else if (key.startsWith('recipe:')) recipesFromStorage.push(data);
            else if (key.startsWith('route:')) routesFromStorage.push(data);
            else if (key === 'custom_exercises') customExercisesFromStorage = data;
            else if (key === 'meta:seeded') seedFlag = data;
          } catch (e) { /* skip bad keys */ }
        }

        // Seed starters only on true first run (no seed flag AND server returned nothing shared)
        if (!seedFlag && recipesFromStorage.length === 0 && routesFromStorage.length === 0) {
          for (const r of STARTER_RECIPES) {
            const rec = { ...r, timestamp: Date.now(), uses: 0, favorite: false };
            await storage.set(`recipe:${r.id}`, JSON.stringify(rec));
            recipesFromStorage.push(rec);
          }
          for (const rt of STARTER_ROUTES) {
            const route = { ...rt, timestamp: Date.now(), uses: 0, favorite: false };
            await storage.set(`route:${rt.id}`, JSON.stringify(route));
            routesFromStorage.push(route);
          }
          await storage.set('meta:seeded', JSON.stringify({ seeded: true, at: Date.now() }));
        }

        setWorkoutLogs(workouts.sort((a, b) => b.timestamp - a.timestamp));
        setWalkLogs(walks.sort((a, b) => b.timestamp - a.timestamp));
        setYogaLogs(yogas.sort((a, b) => b.timestamp - a.timestamp));
        setWeighIns(weights
          .filter((w) => Number.isFinite(typeof w.weight === 'string' ? parseFloat(w.weight) : w.weight) && Number.isFinite(w.timestamp))
          .sort((a, b) => b.timestamp - a.timestamp));
        setMealLogs(meals.sort((a, b) => b.timestamp - a.timestamp));
        setRecipes(recipesFromStorage.sort((a, b) => (b.favorite ? 1 : 0) - (a.favorite ? 1 : 0) || b.uses - a.uses));
        setRoutes(routesFromStorage.sort((a, b) => (b.favorite ? 1 : 0) - (a.favorite ? 1 : 0) || b.uses - a.uses));
        setCustomExercises(customExercisesFromStorage);
      } catch (e) {
        console.error('Load error:', e);
      }
      setLoading(false);
    }
    loadData();
  }, []);

  // Derived: suggest next weight for each exercise based on last session
  const getNextWeight = (workoutKey, exerciseId) => {
    const lastSession = workoutLogs.find(w => w.workout === workoutKey);
    if (!lastSession) {
      const ex = WORKOUTS[workoutKey].exercises.find(e => e.id === exerciseId);
      return { weight: ex.startWeight, reps: [], note: 'starting weight' };
    }
    const lastEx = lastSession.exercises.find(e => e.id === exerciseId);
    if (!lastEx) {
      const ex = WORKOUTS[workoutKey].exercises.find(e => e.id === exerciseId);
      return { weight: ex.startWeight, reps: [], note: 'starting weight' };
    }
    const exDef = WORKOUTS[workoutKey].exercises.find(e => e.id === exerciseId);
    const topRep = exDef.repRange[1];
    const lastReps = lastEx.sets.map(s => s.reps);
    const hitAllReps = lastEx.sets.every(s => s.reps >= topRep);
    if (hitAllReps) {
      const increment = exerciseId === 'squat' || exerciseId === 'rdl' || exerciseId === 'back_squat' || exerciseId === 'deadlift' ? 10 : 5;
      return { weight: lastEx.sets[0].weight + increment, reps: lastReps, lastSets: lastEx.sets, note: `+${increment} lb (progression)` };
    }
    return { weight: lastEx.sets[0].weight, reps: lastReps, lastSets: lastEx.sets, note: 'repeat (consolidate)' };
  };

  const startWorkout = (key) => {
    const workout = WORKOUTS[key];
    const extras = customExercises[key] || [];
    const allExercises = [...workout.exercises, ...extras];
    const session = {
      workout: key,
      exercises: allExercises.map(ex => {
        const suggestion = getNextWeight(key, ex.id);
        return {
          id: ex.id,
          name: ex.name,
          repRange: ex.repRange,
          cues: ex.cues,
          suggestedWeight: suggestion.weight,
          suggestedNote: suggestion.note,
          lastSets: suggestion.lastSets || [],
          sets: Array(ex.sets || 3).fill(null).map((_, i) => ({
            weight: suggestion.weight,
            // Reps start EMPTY — last session's count is shown as a reference
            // placeholder, but nothing counts as done until you enter today's
            reps: '',
            lastReps: suggestion.reps[i] != null ? suggestion.reps[i] : null,
            done: false,
          })),
        };
      }),
    };
    setActiveWorkout(key);
    setActiveSession(session);
    setView('active-workout');
  };

  // Add an exercise (from catalog or custom) into a specific day
  const addExerciseToDay = async (dayKey, exDef) => {
    const current = customExercises[dayKey] || [];
    // Avoid duplicate ids within the same day
    if (current.some(e => e.id === exDef.id) || WORKOUTS[dayKey].exercises.some(e => e.id === exDef.id)) {
      return { ok: false, reason: 'already in this day' };
    }
    const updated = { ...customExercises, [dayKey]: [...current, exDef] };
    setCustomExercises(updated);
    await storage.set('custom_exercises', JSON.stringify(updated));
    return { ok: true };
  };

  const removeExerciseFromDay = async (dayKey, exId) => {
    const current = customExercises[dayKey] || [];
    const updated = { ...customExercises, [dayKey]: current.filter(e => e.id !== exId) };
    setCustomExercises(updated);
    await storage.set('custom_exercises', JSON.stringify(updated));
  };

  // getNextWeight needs to see custom exercises too
  const getNextWeightForDef = (exDef, dayKey) => {
    const lastSession = workoutLogs.find(w => w.workout === dayKey);
    if (!lastSession) return { weight: exDef.startWeight, reps: [], note: 'starting weight' };
    const lastEx = lastSession.exercises.find(e => e.id === exDef.id);
    if (!lastEx) return { weight: exDef.startWeight, reps: [], note: 'starting weight' };
    const topRep = exDef.repRange[1];
    const lastReps = lastEx.sets.map(s => s.reps);
    const hitAllReps = lastEx.sets.every(s => s.reps >= topRep);
    if (hitAllReps) {
      const heavyCompound = ['squat', 'rdl', 'back_squat', 'deadlift', 'front_squat', 'good_morning'].includes(exDef.id);
      const increment = heavyCompound ? 10 : 5;
      return { weight: lastEx.sets[0].weight + increment, reps: lastReps, note: `+${increment} lb (progression)` };
    }
    return { weight: lastEx.sets[0].weight, reps: lastReps, note: 'repeat (consolidate)' };
  };

  const updateSet = (exIdx, setIdx, field, value) => {
    const updated = { ...activeSession };
    updated.exercises[exIdx].sets[setIdx][field] = value;
    setActiveSession(updated);
  };

  const toggleSetDone = (exIdx, setIdx) => {
    const updated = { ...activeSession };
    updated.exercises[exIdx].sets[setIdx].done = !updated.exercises[exIdx].sets[setIdx].done;
    setActiveSession(updated);
  };

  const finishWorkout = async () => {
    const record = {
      id: `workout_${Date.now()}`,
      timestamp: Date.now(),
      date: selectedDate,
      workout: activeWorkout,
      exercises: activeSession.exercises.map(ex => ({
        id: ex.id,
        name: ex.name,
        sets: ex.sets
          .filter(s => s.done || (parseInt(s.reps) || 0) > 0)
          .map(s => ({ weight: parseFloat(s.weight) || 0, reps: parseInt(s.reps) || 0 })),
      })),
    };
    try {
      await storage.set(`workout:${record.id}`, JSON.stringify(record));
      setWorkoutLogs([record, ...workoutLogs]);
      setActiveSession(null);
      setActiveWorkout(null);
      setView('home');
    } catch (e) {
      alert('Save failed: ' + e.message);
    }
  };

  // Recipe handlers
  const saveRecipe = async (recipeData) => {
    const id = recipeData.id || `recipe_${Date.now()}`;
    const existing = recipes.find(r => r.id === id);
    const record = {
      ...recipeData,
      id,
      timestamp: existing?.timestamp || Date.now(),
      uses: existing?.uses || 0,
      favorite: existing?.favorite || false,
    };
    await storage.set(`recipe:${id}`, JSON.stringify(record));
    const updated = existing
      ? recipes.map(r => r.id === id ? record : r)
      : [...recipes, record];
    setRecipes(updated.sort((a, b) => (b.favorite ? 1 : 0) - (a.favorite ? 1 : 0) || b.uses - a.uses));
  };

  const deleteRecipe = async (id) => {
    await storage.delete(`recipe:${id}`);
    setRecipes(recipes.filter(r => r.id !== id));
  };

  const toggleRecipeFavorite = async (id) => {
    const recipe = recipes.find(r => r.id === id);
    if (!recipe) return;
    const updated = { ...recipe, favorite: !recipe.favorite };
    await storage.set(`recipe:${id}`, JSON.stringify(updated));
    setRecipes(recipes.map(r => r.id === id ? updated : r)
      .sort((a, b) => (b.favorite ? 1 : 0) - (a.favorite ? 1 : 0) || b.uses - a.uses));
  };

  const useRecipe = async (recipe) => {
    // Increment use count
    const updated = { ...recipe, uses: (recipe.uses || 0) + 1 };
    await storage.set(`recipe:${recipe.id}`, JSON.stringify(updated));
    setRecipes(recipes.map(r => r.id === recipe.id ? updated : r));
    // Log as a meal
    const mealRecord = {
      id: `meal_${Date.now()}`,
      timestamp: Date.now(),
      date: selectedDate,
      name: recipe.name,
      calories: recipe.calories,
      protein: recipe.protein,
      carbs: recipe.carbs || 0,
      mealType: recipe.mealType,
      fromRecipe: recipe.id,
    };
    await storage.set(`meal:${mealRecord.id}`, JSON.stringify(mealRecord));
    setMealLogs([mealRecord, ...mealLogs]);
    setView('home');
  };

  // Route handlers
  const saveRoute = async (routeData) => {
    const id = routeData.id || `route_${Date.now()}`;
    const existing = routes.find(r => r.id === id);
    const record = {
      ...routeData,
      id,
      timestamp: existing?.timestamp || Date.now(),
      uses: existing?.uses || 0,
      favorite: existing?.favorite || false,
    };
    await storage.set(`route:${id}`, JSON.stringify(record));
    const updated = existing
      ? routes.map(r => r.id === id ? record : r)
      : [...routes, record];
    setRoutes(updated.sort((a, b) => (b.favorite ? 1 : 0) - (a.favorite ? 1 : 0) || b.uses - a.uses));
  };

  const deleteRoute = async (id) => {
    await storage.delete(`route:${id}`);
    setRoutes(routes.filter(r => r.id !== id));
  };

  const toggleRouteFavorite = async (id) => {
    const route = routes.find(r => r.id === id);
    if (!route) return;
    const updated = { ...route, favorite: !route.favorite };
    await storage.set(`route:${id}`, JSON.stringify(updated));
    setRoutes(routes.map(r => r.id === id ? updated : r)
      .sort((a, b) => (b.favorite ? 1 : 0) - (a.favorite ? 1 : 0) || b.uses - a.uses));
  };

  const useRoute = async (route) => {
    // Increment use count
    const updated = { ...route, uses: (route.uses || 0) + 1 };
    await storage.set(`route:${route.id}`, JSON.stringify(updated));
    setRoutes(routes.map(r => r.id === route.id ? updated : r));
    // Log as walk
    const walkRecord = {
      id: `walk_${Date.now()}`,
      timestamp: Date.now(),
      date: selectedDate,
      miles: route.miles,
      minutes: route.minutes,
      steps: Math.round(route.miles * STEPS_PER_MILE),
      inputMode: 'miles',
      fromRoute: route.id,
      routeName: route.name,
    };
    await storage.set(`walk:${walkRecord.id}`, JSON.stringify(walkRecord));
    setWalkLogs([walkRecord, ...walkLogs]);
    setView('home');
  };

  if (loading) {
    return (
      <div className="min-h-screen bg-stone-950 flex items-center justify-center text-stone-400" style={{ fontFamily: 'Georgia, serif' }}>
        <div className="text-sm tracking-widest uppercase">Loading</div>
      </div>
    );
  }

  return (
    <div className="min-h-screen bg-stone-950 text-stone-100 pb-24" style={{ fontFamily: 'Georgia, "Times New Roman", serif' }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap');
        .display { font-family: 'Instrument Serif', Georgia, serif; font-weight: 400; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .grain { background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.03) 1px, transparent 0); background-size: 4px 4px; }
      `}</style>

      {view === 'home' && (
        <HomeView
          targets={targets}
          onSaveTargets={saveTargets}
          workoutLogs={workoutLogs}
          walkLogs={walkLogs}
          weighIns={weighIns}
          mealLogs={mealLogs}
          yogaLogs={yogaLogs}
          selectedDate={selectedDate}
          onSelectDate={setSelectedDate}
          onStartWorkout={startWorkout}
          onNavigate={setView}
        />
      )}
      {view === 'active-workout' && activeSession && (
        <ActiveWorkoutView
          session={activeSession}
          workoutKey={activeWorkout}
          selectedDate={selectedDate}
          customExercises={customExercises}
          onUpdateSet={updateSet}
          onToggleDone={toggleSetDone}
          onFinish={finishWorkout}
          onAddExercise={addExerciseToDay}
          onRemoveExercise={removeExerciseFromDay}
          getNextWeightForDef={getNextWeightForDef}
          onCancel={() => { setActiveSession(null); setView('home'); }}
        />
      )}
      {view === 'walk' && (
        <WalkView
          walkLogs={walkLogs}
          routes={routes}
          selectedDate={selectedDate}
          onSave={async (walk) => {
            const record = { id: `walk_${Date.now()}`, timestamp: Date.now(), date: selectedDate, ...walk };
            await storage.set(`walk:${record.id}`, JSON.stringify(record));
            setWalkLogs([record, ...walkLogs]);
            setView('home');
          }}
          onUseRoute={useRoute}
          onManageRoutes={() => setView('routes')}
          onBack={() => setView('home')}
        />
      )}
      {view === 'yoga' && (
        <YogaView
          yogaLogs={yogaLogs}
          selectedDate={selectedDate}
          onSave={async (yoga) => {
            const record = { id: `yoga_${Date.now()}`, timestamp: Date.now(), date: selectedDate, ...yoga };
            await storage.set(`yoga:${record.id}`, JSON.stringify(record));
            setYogaLogs([record, ...yogaLogs]);
            setView('home');
          }}
          onBack={() => setView('home')}
        />
      )}
      {view === 'weigh' && (
        <WeighView
          weighIns={weighIns}
          selectedDate={selectedDate}
          onSave={async (weight) => {
            const record = { id: `weigh_${Date.now()}`, timestamp: Date.now(), date: selectedDate, weight };
            await storage.set(`weigh:${record.id}`, JSON.stringify(record));
            setWeighIns([record, ...weighIns]);
            setView('home');
          }}
          onBack={() => setView('home')}
        />
      )}
      {view === 'meal' && (
        <MealView
          mealLogs={mealLogs}
          recipes={recipes}
          selectedDate={selectedDate}
          onSave={async (meal) => {
            const record = { id: `meal_${Date.now()}`, timestamp: Date.now(), date: selectedDate, ...meal };
            await storage.set(`meal:${record.id}`, JSON.stringify(record));
            setMealLogs([record, ...mealLogs]);
            setView('home');
          }}
          onUseRecipe={useRecipe}
          onManageRecipes={() => setView('recipes')}
          onDeleteMeal={async (id) => {
            await storage.delete(`meal:${id}`);
            setMealLogs(mealLogs.filter(m => m.id !== id));
          }}
          onBack={() => setView('home')}
        />
      )}
      {view === 'recipes' && (
        <RecipesView
          recipes={recipes}
          onSave={saveRecipe}
          onDelete={deleteRecipe}
          onToggleFavorite={toggleRecipeFavorite}
          onBack={() => setView('meal')}
        />
      )}
      {view === 'routes' && (
        <RoutesView
          routes={routes}
          onSave={saveRoute}
          onDelete={deleteRoute}
          onToggleFavorite={toggleRouteFavorite}
          onBack={() => setView('walk')}
        />
      )}
      {view === 'progress' && (
        <ProgressView
          workoutLogs={workoutLogs}
          walkLogs={walkLogs}
          weighIns={weighIns}
          mealLogs={mealLogs}
          onBack={() => setView('home')}
        />
      )}
    </div>
  );
}

function HomeView({ targets, onSaveTargets, workoutLogs, walkLogs, weighIns, mealLogs, yogaLogs, selectedDate, onSelectDate, onStartWorkout, onNavigate }) {

  const [expandedRecent, setExpandedRecent] = useState(null);
  const [tCal, setTCal] = useState('');
  const [tProt, setTProt] = useState('');
  const [tCarb, setTCarb] = useState('');
  const today = todayStr();
  const isToday = selectedDate === today;
  const isFuture = selectedDate > today;
  const dayMeals = mealLogs.filter(m => m.date === selectedDate);
  const dayCals = dayMeals.reduce((sum, m) => sum + (m.calories || 0), 0);
  const dayProtein = dayMeals.reduce((sum, m) => sum + (m.protein || 0), 0);
  const dayCarbs = dayMeals.reduce((sum, m) => sum + (m.carbs || 0), 0);
  // Carbs is a CEILING, not a goal: green under, amber near (>=80%), red over
  const carbTone = targets.carbs > 0 && dayCarbs > targets.carbs ? 'text-red-400'
    : targets.carbs > 0 && dayCarbs >= targets.carbs * 0.8 ? 'text-amber-400'
    : 'text-stone-100';
  const dayWalk = walkLogs.find(w => w.date === selectedDate);
  const dayWeight = weighIns.find(w => w.date === selectedDate);
  const dayWorkout = workoutLogs.find(w => w.date === selectedDate);
  const dayYoga = (yogaLogs || []).find(y => y.date === selectedDate);
  const latestWeight = weighIns[0];

  // Figure out which workout is next (alternate)
  const lastWorkout = workoutLogs[0];
  const lastIdx = lastWorkout ? WORKOUT_CYCLE.indexOf(lastWorkout.workout) : -1;
  const nextWorkoutKey = WORKOUT_CYCLE[(lastIdx + 1) % WORKOUT_CYCLE.length];

  // Streak: consecutive days with any activity
  const calcStreak = () => {
    const allDates = new Set([
      ...workoutLogs.map(w => w.date),
      ...walkLogs.map(w => w.date),
    ]);
    let streak = 0;
    const d = new Date();
    while (allDates.has(localDateStr(d))) {
      streak++;
      d.setDate(d.getDate() - 1);
    }
    return streak;
  };
  const streak = calcStreak();

  return (
    <div className="px-6 pt-10">

        <button

        >
          <div className="mono text-xs text-stone-500 tracking-[0.2em] uppercase">

          disabled={isToday}

      </div>

      <div className="mb-10">
        <h1 className="display text-5xl text-stone-100 leading-none">

        </h1>
      </div>

      {/* Today's snapshot — now reflects selected date */}
      <div className="grid grid-cols-2 gap-3 mb-8">
        <StatCard label="Streak" value={streak} unit={streak === 1 ? 'day' : 'days'} icon={<Flame className="w-4 h-4" />} />
        <StatCard
          label={dayWeight ? 'Weight (this day)' : 'Latest weight'}
          value={dayWeight ? dayWeight.weight : (latestWeight ? latestWeight.weight : '—')}
          unit={dayWeight || latestWeight ? 'lbs' : ''}
          icon={<Scale className="w-4 h-4" />}
        />

        <StatCard label="Protein" value={dayProtein || '—'} unit={dayProtein ? `g / ${targets.protein}g` : ''} icon={<Target className="w-4 h-4" />} />
        {targets.carbs > 0 && (
          <StatCard label="Carbs" value={dayCarbs || '—'} unit={dayCarbs ? `g / ≤${targets.carbs}g` : `limit ${targets.carbs}g`} icon={<Utensils className="w-4 h-4" />} valueClass={carbTone} />
        )}

      {/* Workout complete today: show the accomplishment, not the next day */}
      {isToday && dayWorkout && (
        <div className="mb-6 border border-emerald-800 bg-emerald-950/20 p-6">
          <div className="flex items-center gap-2 mb-2">
            <Check className="w-4 h-4 text-emerald-500" />

              <div>
                <div className="display text-4xl leading-none">{WORKOUTS[nextWorkoutKey].name}</div>
                <div className="mono text-xs text-stone-600 mt-2 tracking-wider uppercase">{WORKOUTS[nextWorkoutKey].focus} · suggested</div>
              </div>
              <ChevronRight className="w-6 h-6 mt-1 group-hover:translate-x-1 transition-transform" />
            </div>
            <div className="mt-4 pt-4 border-t border-stone-300 text-sm italic text-stone-700">
              "{WORKOUTS[nextWorkoutKey].cue}"

      {!isToday && dayWorkout && (
        <div className="mb-6 border border-stone-800 p-5">
          <div className="mono text-xs text-stone-500 tracking-[0.2em] uppercase mb-2">Logged this day</div>
          <div className="display text-3xl">Workout {dayWorkout.workout}</div>
          <div className="mono text-xs text-stone-500 mt-2">
            {dayWorkout.exercises.reduce((s, e) => s + e.sets.length, 0)} sets across {dayWorkout.exercises.length} exercises

      {/* Quick actions */}
      <div className="mb-6">
        <div className="mono text-xs text-stone-500 tracking-[0.2em] uppercase mb-3">

        <div className="grid grid-cols-2 gap-2">
          <QuickButton icon={<Footprints className="w-5 h-5" />} label="Mobility" active={!!dayWalk} onClick={() => onNavigate('walk')} />
          <QuickButton icon={<Flower2 className="w-5 h-5" />} label="Yoga" active={!!dayYoga} onClick={() => onNavigate('yoga')} />
          <QuickButton icon={<Scale className="w-5 h-5" />} label="Weigh" active={!!dayWeight} onClick={() => onNavigate('weigh')} />
          <QuickButton icon={<Utensils className="w-5 h-5" />} label="Meal" active={dayMeals.length > 0} onClick={() => onNavigate('meal')} />

          <div className="mt-3 mono text-xs text-emerald-600 tracking-wider uppercase">
            ✓ {dayWalk.activityType || 'walk'}: {dayWalk.miles ? `${dayWalk.miles} mi` : `${dayWalk.minutes} min`}{dayWalk.steps ? ` (${dayWalk.steps.toLocaleString()} steps)` : ''}

        </span>

      {/* Recent activity preview */}

                    <div className="flex-1">
                      {item.type === 'workout'

                <input type="number" value={tProt} onChange={(e) => setTProt(e.target.value)}
                  className="w-full bg-transparent border border-stone-700 text-stone-200 text-center py-2 mono text-sm focus:border-amber-600 outline-none" />

              <div>
                <div className="mono text-[10px] text-stone-500 tracking-wider uppercase mb-1">Carb limit</div>

                  className="w-full bg-transparent border border-stone-700 text-stone-200 text-center py-2 mono text-sm focus:border-amber-600 outline-none" />
              </div>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <button
                onClick={() => { onSaveTargets({ calories: tCal, protein: tProt, carbs: tCarb }); setEditingTargets(false); }}
                className="border border-amber-700 text-amber-400 mono text-xs tracking-wider uppercase py-2 hover:bg-amber-950/40"
              >
                Save
              </button>
              <button
                onClick={() => setEditingTargets(false)}
                className="border border-stone-800 text-stone-500 mono text-xs tracking-wider uppercase py-2 hover:bg-stone-900"
              >
                Cancel
              </button>
            </div>
          </div>
        )}
        <div className="mono text-[10px] text-stone-600 tracking-[0.2em] uppercase text-center mb-2">Backup</div>
        <div className="grid grid-cols-2 gap-2">
          <button
            onClick={async () => {
              const all = {};
              const keys = await storage.list('');
              for (const k of keys.keys) {
                const r = await storage.get(k);
                if (r) all[k] = JSON.parse(r.value);
              }
              const exportObj = { version: 1, exportedAt: new Date().toISOString(), data: all };
              const blob = new Blob([JSON.stringify(exportObj, null, 2)], { type: 'application/json' });
              const url = URL.createObjectURL(blob);
              const a = document.createElement('a');
              a.href = url;
              a.download = `tracker_backup_${todayStr()}.json`;
              a.click();
              URL.revokeObjectURL(url);
            }}
            className="border border-stone-800 text-stone-400 mono text-xs tracking-wider uppercase py-3 hover:bg-stone-900 hover:text-stone-200 transition-colors"
          >
            Export
          </button>
          <button
            onClick={() => {
              const input = document.createElement('input');
              input.type = 'file';
              input.accept = 'application/json,.json';
              input.onchange = async (e) => {
                const file = e.target.files?.[0];
                if (!file) return;
                try {
                  const text = await file.text();
                  const parsed = JSON.parse(text);
                  // Accept both wrapped {version, data} and bare {key: value} formats
                  const data = parsed.data || parsed;
                  const keyCount = Object.keys(data).length;
                  if (!keyCount) {
                    alert('That file looks empty.');
                    return;
                  }
                  if (!confirm(`Import ${keyCount} entries? This will overwrite any existing entries with the same keys.`)) return;
                  for (const [key, value] of Object.entries(data)) {
                    await storage.set(key, JSON.stringify(value));
                  }
                  alert(`Imported ${keyCount} entries. Reloading...`);
                  window.location.reload();
                } catch (err) {
                  alert('Could not read that file: ' + err.message);
                }
              };
              input.click();
            }}
            className="border border-stone-800 text-stone-400 mono text-xs tracking-wider uppercase py-3 hover:bg-stone-900 hover:text-stone-200 transition-colors"
          >
            Import
          </button>
        </div>
        <div className="mono text-[10px] text-stone-700 tracking-wider text-center pt-2">
          Synced to the cloud for {firebase.auth().currentUser?.email || 'your account'}.
        </div>
        <button
          onClick={async () => { await firebase.auth().signOut(); window.location.reload(); }}
          className="w-full border border-stone-800 text-stone-500 mono text-xs tracking-wider uppercase py-3 hover:bg-stone-900 hover:text-stone-300 transition-colors"
        >
          Sign out
        </button>
      </div>
    </div>
  );
}

function ActiveWorkoutView({ session, workoutKey, selectedDate, customExercises, onUpdateSet, onToggleDone, onFinish, onAddExercise, onRemoveExercise, getNextWeightForDef, onCancel }) {
  const workout = WORKOUTS[workoutKey];
  const totalSets = session.exercises.reduce((s, e) => s + e.sets.length, 0);
  // A set counts as "done" if either the user tapped the checkmark OR they entered reps
  const isSetComplete = (set) => set.done || (parseInt(set.reps) || 0) > 0;
  const doneSets = session.exercises.reduce((s, e) => s + e.sets.filter(isSetComplete).length, 0);
  const isBackdated = selectedDate !== todayStr();
  const [showPicker, setShowPicker] = useState(false);

  // ids already present in this day (template + custom)
  const presentIds = new Set([
    ...workout.exercises.map(e => e.id),
    ...(customExercises[workoutKey] || []).map(e => e.id),
  ]);
  const dayCustom = customExercises[workoutKey] || [];

  return (
    <div className="px-6 pt-8">
      <button onClick={onCancel} className="mono text-xs text-stone-500 tracking-wider uppercase mb-4 flex items-center gap-2 hover:text-stone-300">
        <X className="w-3 h-3" /> Cancel
      </button>
      <div className="mb-6">
        <div className="mono text-xs text-amber-600 tracking-[0.2em] uppercase mb-2">
          In session · <span className={isBackdated ? 'text-amber-400' : ''}>{humanDate(selectedDate)}</span>
        </div>
        <h1 className="display text-5xl leading-none mb-2">{workout.name}</h1>
        <div className="mono text-xs text-stone-500 tracking-wider uppercase mb-4">{workout.focus}</div>
        <div className="border-l-2 border-amber-600 pl-4 text-sm italic text-stone-300">
          {workout.cue}
        </div>
      </div>

      <div className="mb-4 flex items-center justify-between mono text-xs text-stone-500">
        <span>{doneSets} / {totalSets} sets complete</span>
        <span>{Math.round((doneSets / totalSets) * 100)}%</span>
      </div>
      <div className="h-1 bg-stone-900 mb-8">
        <div className="h-full bg-amber-600 transition-all" style={{ width: `${(doneSets / totalSets) * 100}%` }} />
      </div>

      <div className="space-y-8">
        {session.exercises.map((ex, exIdx) => {
          const isCustom = dayCustom.some(c => c.id === ex.id);
          return (
            <ExerciseBlock
              key={ex.id}
              ex={ex}
              exIdx={exIdx}
              isCustom={isCustom}
              onRemove={isCustom ? () => onRemoveExercise(workoutKey, ex.id) : null}
              onUpdateSet={onUpdateSet}
              onToggleDone={onToggleDone}
            />
          );
        })}
      </div>

      {/* Add exercise from library */}
      <div className="mt-8 border-t border-stone-800 pt-6">
        {!showPicker ? (
          <button
            onClick={() => setShowPicker(true)}
            className="w-full border border-stone-700 text-stone-300 p-4 flex items-center justify-center gap-2 hover:bg-stone-900 transition-colors mono text-xs tracking-wider uppercase"
          >
            <Plus className="w-4 h-4" /> Add exercise to {workout.name}
          </button>
        ) : (
          <ExercisePicker
            presentIds={presentIds}
            onPick={async (exDef) => {
              await onAddExercise(workoutKey, exDef);
              setShowPicker(false);
            }}
            onClose={() => setShowPicker(false)}
          />
        )}
        <div className="mono text-[10px] text-stone-700 tracking-wider text-center mt-3">
          Added exercises stay in {workout.name} every time you run it.
        </div>
      </div>

      <button
        onClick={onFinish}
        disabled={doneSets === 0}
        className="w-full mt-8 bg-amber-600 text-stone-950 p-5 display text-2xl hover:bg-amber-500 disabled:bg-stone-800 disabled:text-stone-600 transition-colors"
      >
        Finish & Save
      </button>
    </div>
  );
}

function ExercisePicker({ presentIds, onPick, onClose }) {
  const [patternFilter, setPatternFilter] = useState('All');
  const patterns = ['All', ...Array.from(new Set(EXERCISE_CATALOG.map(e => e.pattern)))];
  const available = EXERCISE_CATALOG.filter(e =>

function MealView({ mealLogs, recipes, selectedDate, onSave, onUseRecipe, onManageRecipes, onDeleteMeal, onBack }) {
  const [name, setName] = useState('');
  const [calories, setCalories] = useState('');
  const [protein, setProtein] = useState('');
  const [carbs, setCarbs] = useState('');
  const [mealType, setMealType] = useState('lunch');
  const [recipeFilter, setRecipeFilter] = useState('all');

  // Recent foods: most-frequently + most-recently logged, deduped by name
  const recentFoods = React.useMemo(() => {
    const byName = {};
    for (const m of mealLogs) {
      if (!m.name) continue;
      const key = m.name.trim().toLowerCase();
      if (!byName[key]) byName[key] = { name: m.name, calories: m.calories, protein: m.protein, carbs: m.carbs, mealType: m.mealType, count: 0, last: 0 };
      byName[key].count += 1;
      byName[key].last = Math.max(byName[key].last, m.timestamp || 0);
      // keep most recent macros for the entry
      if ((m.timestamp || 0) >= byName[key].last) {
        byName[key].calories = m.calories; byName[key].protein = m.protein; byName[key].carbs = m.carbs;
      }
    }
    return Object.values(byName)
      .sort((a, b) => b.count - a.count || b.last - a.last)
      .slice(0, 8);
  }, [mealLogs]);

  // Open Food Facts search state
  const [searchQuery, setSearchQuery] = useState('');
  const [searchResults, setSearchResults] = useState([]);
  const [searching, setSearching] = useState(false);
  const [searchError, setSearchError] = useState('');
  const [gramsById, setGramsById] = useState({}); // per-result portion in grams
  const [portionsById, setPortionsById] = useState({});   // idx -> [{label, grams}]
  const [portionSelById, setPortionSelById] = useState({}); // idx -> selected portion index or 'g'
  const [qtyById, setQtyById] = useState({});              // idx -> quantity multiplier
  const [portionLoading, setPortionLoading] = useState({});

  const loadPortions = async (r, idx) => {
    if (!r.fdcId || portionsById[idx]) return;
    setPortionLoading(pl => ({ ...pl, [idx]: true }));
    try {
      const d = await authedFetch('/nutrition/food/' + r.fdcId);
      setPortionsById(p => ({ ...p, [idx]: d.portions || [] }));
      if ((d.portions || []).length > 0) {
        setPortionSelById(s => ({ ...s, [idx]: 0 }));
        setQtyById(q => ({ ...q, [idx]: 1 }));
        setGramsById(g => ({ ...g, [idx]: String(Math.round(d.portions[0].grams)) }));
      }
    } catch (e) {
      setPortionsById(p => ({ ...p, [idx]: [] }));
    }
    setPortionLoading(pl => ({ ...pl, [idx]: false }));
  };

  const pickPortion = (idx, sel, qtyRaw) => {
    setPortionSelById(s => ({ ...s, [idx]: sel }));
    setQtyById(q => ({ ...q, [idx]: qtyRaw })); // keep raw so field can be emptied while typing
    const qty = parseFloat(qtyRaw);
    const effQty = isNaN(qty) || qty <= 0 ? 1 : qty;
    const plist = portionsById[idx] || [];
    if (sel !== 'g' && plist[sel]) {
      setGramsById(g => ({ ...g, [idx]: String(Math.round(plist[sel].grams * effQty)) }));
    }
  };

  const dayMeals = mealLogs.filter(m => m.date === selectedDate);
  const dayCals = dayMeals.reduce((s, m) => s + (m.calories || 0), 0);
  const dayProtein = dayMeals.reduce((s, m) => s + (m.protein || 0), 0);
  const dayCarbs = dayMeals.reduce((s, m) => s + (m.carbs || 0), 0);
  const isBackdated = selectedDate !== todayStr();

  const runFoodSearch = async () => {
    const q = searchQuery.trim();
    if (!q) return;
    setSearching(true);
    setSearchError('');
    setSearchResults([]);
    try {
      // Server-side USDA lookup via our Cloud Run API (key never leaves the server)
      const data = await authedFetch('/nutrition/search?q=' + encodeURIComponent(q));
      const products = (data.foods || [])
        .map(f => ({
          fdcId: f.fdcId,
          name: [f.description, f.brand ? `(${f.brand})` : ''].filter(Boolean).join(' ').trim(),
          kcal100: f.calories != null ? f.calories : null,
          protein100: f.protein != null ? f.protein : null,
          carbs100: f.carbs != null ? f.carbs : null,
          servingSize: f.servingSize ? `${f.servingSize}${f.servingSizeUnit || ''}` : null,
        }))
        .filter(p => p.name && (p.kcal100 != null || p.protein100 != null));
      if (products.length === 0) {
        setSearchError('No matches with nutrition data. Try a simpler term, or enter manually.');
      }
      setSearchResults(products.slice(0, 12));
    } catch (e) {
      setSearchError('Could not reach the food database. You can still enter values manually.');
    }
    setSearching(false);
  };

  // Apply a search result to the manual fields, scaled to the chosen grams
  const applyResult = (r, idx) => {
    const grams = parseFloat(gramsById[idx]) || 100;
    const factor = grams / 100;
    if (r.kcal100 != null) setCalories(String(Math.round(r.kcal100 * factor)));
    if (r.protein100 != null) setProtein(String(Math.round(r.protein100 * factor)));
    if (r.carbs100 != null) setCarbs(String(Math.round(r.carbs100 * factor)));
    if (!name) setName(r.name);
    // collapse results after picking
    setSearchResults([]);
    setSearchQuery('');
  };

  const [recipeQuery, setRecipeQuery] = useState('');
  const [foodSaved, setFoodSaved] = useState(false);

  // ---- Barcode scanner ----
  const [scanning, setScanning] = useState(false);
  const [scanMsg, setScanMsg] = useState('');
  const [manualCode, setManualCode] = useState('');
  const [lastBarcode, setLastBarcode] = useState(null);
  const videoRef = React.useRef(null);
  const streamRef = React.useRef(null);
  const scanTimerRef = React.useRef(null);

  const stopScanner = () => {
    if (scanTimerRef.current) { clearInterval(scanTimerRef.current); scanTimerRef.current = null; }
    if (streamRef.current) { streamRef.current.getTracks().forEach(t => t.stop()); streamRef.current = null; }
    setScanning(false);
  };

  const parseServingToGrams = (s) => {
    if (!s) return null;
    const m = s.toLowerCase().replace(',', '.').match(/([\d.]+)\s*(fl\s*oz|floz|ml|l\b|g\b|oz\b)/);
    if (!m) return null;
    const v = parseFloat(m[1]);
    if (!Number.isFinite(v) || v <= 0) return null;
    const unit = m[2].replace(/\s+/g, '');
    if (unit === 'ml' || unit === 'g') return v;
    if (unit === 'l') return v * 1000;
    if (unit === 'floz') return v * 29.57;
    if (unit === 'oz') return v * 28.35;
    return null;
  };

  const lookupBarcode = async (code) => {
    stopScanner();
    setSearchError('');
    setSearchResults([]);
    try {
      const d = await authedFetch('/nutrition/barcode/' + code);
      if (!d.found) {
        setSearchError(`Barcode ${code} not in any database yet — search or enter manually, then "Save to household foods" and it'll scan next time.`);
        setLastBarcode(code); // attach to the eventual manual save
        return;
      }
      setLastBarcode(code);
      // Feed the result through the existing search-result UI (grams scaling and all)
      setSearchResults([{
        name: [d.description, d.brand ? `(${d.brand})` : ''].filter(Boolean).join(' ').trim(),
        kcal100: d.calories,
        protein100: d.protein,
        carbs100: d.carbs,
        servingSize: d.servingSize || null,
      }]);
      // If the product declares a serving size, preload it as the portion so
      // the card defaults to per-serving values, not per-100g
      const servingGrams = parseServingToGrams(d.servingSize);
      if (servingGrams) {
        setPortionsById({ 0: [{ label: `1 serving (${d.servingSize})`, grams: servingGrams }] });
        setPortionSelById({ 0: 0 });
        setQtyById({ 0: 1 });
        setGramsById({ 0: String(Math.round(servingGrams)) });
      } else {
        setPortionsById({}); setPortionSelById({}); setQtyById({}); setGramsById({});
      }
    } catch (e) {
      setSearchError('Barcode lookup failed: ' + e.message);
    }
  };

  const startScanner = async () => {
    setScanMsg(''); setManualCode('');
    setScanning(true);
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
      streamRef.current = stream;
      // video element mounts with the overlay; attach on next tick
      setTimeout(async () => {
        if (!videoRef.current) return;
        videoRef.current.srcObject = stream;
        await videoRef.current.play().catch(() => {});
        if ('BarcodeDetector' in window) {
          const detector = new window.BarcodeDetector({ formats: ['upc_a', 'upc_e', 'ean_13', 'ean_8'] });
          scanTimerRef.current = setInterval(async () => {
            try {
              const codes = await detector.detect(videoRef.current);
              if (codes.length > 0 && codes[0].rawValue) {
                lookupBarcode(codes[0].rawValue.replace(/[^0-9]/g, ''));
              }
            } catch (e) { /* frame not ready; keep trying */ }
          }, 300);
        } else {
          setScanMsg('Auto-detect not supported in this browser — type the number under the barcode below.');
        }
      }, 50);
    } catch (e) {
      setScanMsg('Camera unavailable: ' + e.message + ' — type the barcode number below.');
    }
  };

  React.useEffect(() => () => stopScanner(), []); // cleanup on unmount

  const saveToHousehold = async () => {
    if (!name || !(parseInt(calories) || 0)) return;
    try {
      await authedFetch('/shared/foods', {
        method: 'POST',
        body: JSON.stringify({
          name: name.trim(),
          calories: parseInt(calories) || 0,
          protein: parseInt(protein) || 0,
          carbs: parseInt(carbs) || 0,
          ...(lastBarcode ? { barcode: lastBarcode } : {}),
        }),
      });
      setFoodSaved(true);
      setTimeout(() => setFoodSaved(false), 2500);
    } catch (e) {
      alert('Save to household foods failed: ' + e.message);
    }
  };
  const rq = recipeQuery.trim().toLowerCase();
  const recipeMatches = (r) => !rq
    || (r.name || '').toLowerCase().includes(rq)
    || (r.notes || '').toLowerCase().includes(rq)
    || (r.ingredients || []).some((ing) => (ing.name || '').toLowerCase().includes(rq));
  const filteredRecipes = (recipeFilter === 'all'
    ? recipes
    : recipes.filter(r => r.mealType === recipeFilter))
    .filter(recipeMatches);
  // Searching shows all matches; browsing shows the top 6
  const topRecipes = rq ? filteredRecipes : filteredRecipes.slice(0, 6);

  return (
    <div className="px-6 pt-8">
      <button onClick={onBack} className="mono text-xs text-stone-500 tracking-wider uppercase mb-4 hover:text-stone-300">← Back</button>
      <div className={`mono text-xs tracking-[0.2em] uppercase mb-2 ${isBackdated ? 'text-amber-500' : 'text-stone-500'}`}>
        {humanDate(selectedDate)}
      </div>
      <h1 className="display text-5xl mb-2">Log a meal.</h1>
      <div className="mono text-xs text-stone-500 tracking-wider uppercase mb-8">
        This day so far: {dayCals} cal · {dayProtein}g protein{dayCarbs ? ` · ${dayCarbs}g carbs` : ''}
      </div>

      <div className="space-y-6">
        <div>
          <label className="mono text-xs text-stone-500 tracking-wider uppercase mb-2 block">Meal</label>
          <div className="grid grid-cols-3 gap-2">
            {['lunch', 'dinner', 'snack'].map(type => (
              <button
                key={type}
                onClick={() => setMealType(type)}
                className={`border py-3 mono text-xs tracking-wider uppercase ${mealType === type ? 'border-amber-600 bg-amber-950/40 text-amber-300' : 'border-stone-800 text-stone-500'}`}
              >
                {type}
              </button>
            ))}
          </div>
        </div>
        <Field label="What did you eat?">
          <input
            type="text"
            value={name}
            onChange={(e) => setName(e.target.value)}
            placeholder="e.g. grilled chicken, salad, sweet potato"
            className="w-full bg-transparent border-b border-stone-700 text-xl py-3 focus:border-amber-600 outline-none placeholder:text-stone-700"
          />
        </Field>

        {/* Nutrition lookup (Open Food Facts) */}
        <div className="border border-stone-800 p-4">
          <div className="mono text-xs text-stone-500 tracking-wider uppercase mb-3">Look up nutrition</div>
          <div className="flex gap-2">
            <input
              type="text"
              value={searchQuery}
              onChange={(e) => setSearchQuery(e.target.value)}
              onKeyDown={(e) => { if (e.key === 'Enter') runFoodSearch(); }}
              placeholder="Search a food or product…"
              className="flex-1 bg-transparent border-b border-stone-700 py-2 text-sm focus:border-amber-600 outline-none placeholder:text-stone-700"
            />
            <button
              onClick={runFoodSearch}
              disabled={searching || !searchQuery.trim()}
              className="mono text-xs tracking-wider uppercase border border-stone-700 px-3 hover:bg-stone-900 disabled:text-stone-700"
            >
              {searching ? '…' : 'Search'}
            </button>
            <button
              onClick={startScanner}
              className="mono text-xs tracking-wider uppercase border border-stone-700 px-3 hover:border-amber-700 hover:text-amber-400"
              aria-label="Scan barcode"
            >
              Scan
            </button>
          </div>

          {searchError && (
            <div className="mono text-[10px] text-stone-500 mt-3 leading-relaxed">{searchError}</div>
          )}

          {searchResults.length > 0 && (
            <div className="mt-4 space-y-2 max-h-80 overflow-y-auto">
              {searchResults.map((r, idx) => (
                <div key={idx} className="border border-stone-800 p-3">
                  <div className="text-sm text-stone-100 mb-1">{r.name}</div>
                  <div className="mono text-[10px] text-stone-500 tracking-wider uppercase mb-2">
                    per 100g: {r.kcal100 != null ? `${Math.round(r.kcal100)} cal` : 'cal n/a'}
                    {r.protein100 != null ? ` · ${Math.round(r.protein100)}g protein` : ''}
                    {r.servingSize ? ` · serving ${r.servingSize}` : ''}
                  </div>
                  {portionsById[idx] === undefined && r.fdcId && (
                    <button
                      onClick={() => loadPortions(r, idx)}
                      disabled={portionLoading[idx]}
                      className="mono text-[10px] tracking-wider uppercase border border-stone-700 text-stone-400 px-2 py-1 mb-2 hover:border-amber-700 hover:text-amber-400 disabled:opacity-50"
                    >
                      {portionLoading[idx] ? 'Loading…' : 'Portions (1 egg, 1 slice…)'}
                    </button>
                  )}
                  {(portionsById[idx] || []).length > 0 && (
                    <div className="flex items-center gap-2 mb-2">
                      <input
                        type="number"
                        min="0"
                        step="0.25"
                        placeholder="1"
                        value={qtyById[idx] ?? 1}
                        onChange={(e) => pickPortion(idx, portionSelById[idx] ?? 0, e.target.value)}
                        className="w-14 bg-transparent border border-stone-700 text-center py-1 mono text-sm focus:border-amber-600 outline-none"
                      />
                      <span className="mono text-[10px] text-stone-500">×</span>
                      <select
                        value={portionSelById[idx] ?? 0}
                        onChange={(e) => pickPortion(idx, parseInt(e.target.value), qtyById[idx] ?? '1')}
                        className="flex-1 bg-stone-950 border border-stone-700 text-stone-200 mono text-xs py-1 px-2 focus:border-amber-600 outline-none"
                      >
                        {(portionsById[idx] || []).map((p, pi) => (
                          <option key={pi} value={pi}>{p.label} ({Math.round(p.grams)}g)</option>
                        ))}
                      </select>
                    </div>
                  )}
                  {portionsById[idx] !== undefined && (portionsById[idx] || []).length === 0 && (
                    <div className="mono text-[10px] text-stone-600 mb-2">No portion data for this item — use grams.</div>
                  )}
                  <div className="flex items-center gap-2">
                    <input
                      type="number"
                      value={gramsById[idx] ?? 100}
                      onChange={(e) => setGramsById({ ...gramsById, [idx]: e.target.value })}
                      className="w-20 bg-transparent border border-stone-700 text-center py-1 mono text-sm focus:border-amber-600 outline-none"
                    />
                    <span className="mono text-[10px] text-stone-500 tracking-wider uppercase">grams</span>
                    <button
                      onClick={() => applyResult(r, idx)}
                      className="ml-auto mono text-xs tracking-wider uppercase border border-amber-700 text-amber-400 px-3 py-1 hover:bg-amber-950/40"
                    >
                      Use
                    </button>
                  </div>
                </div>
              ))}
              <div className="mono text-[10px] text-stone-600 leading-relaxed pt-1">
                Data from USDA FoodData Central. Tap Portions for household measures.
              </div>
            </div>
          )}
        </div>
        <div className="grid grid-cols-3 gap-3">
          <Field label="Calories">
            <input
              type="number"
              value={calories}
              onChange={(e) => setCalories(e.target.value)}
              className="w-full bg-transparent border-b border-stone-700 text-2xl display py-3 focus:border-amber-600 outline-none"
            />
          </Field>
          <Field label="Protein (g)">
            <input
              type="number"
              value={protein}
              onChange={(e) => setProtein(e.target.value)}
              className="w-full bg-transparent border-b border-stone-700 text-2xl display py-3 focus:border-amber-600 outline-none"
            />
          </Field>
          <Field label="Carbs (g)">
            <input
              type="number"
              value={carbs}
              onChange={(e) => setCarbs(e.target.value)}
              className="w-full bg-transparent border-b border-stone-700 text-2xl display py-3 focus:border-amber-600 outline-none"
            />
          </Field>
        </div>

        {name && (parseInt(calories) || 0) > 0 && (
          <button
            onClick={saveToHousehold}
            disabled={foodSaved}
            className={`w-full border mono text-xs tracking-wider uppercase py-3 transition-colors ${
              foodSaved
                ? 'border-emerald-800 text-emerald-500'
                : 'border-stone-800 text-stone-500 hover:border-amber-700 hover:text-amber-400'
            }`}
          >
            {foodSaved ? '✓ Saved — searchable by the whole household' : 'Save to household foods'}
          </button>
        )}
      </div>

      <button
        onClick={() => onSave({
          name,
          calories: parseInt(calories) || 0,
          protein: parseInt(protein) || 0,
          carbs: parseInt(carbs) || 0,
          mealType,
        })}
        disabled={!name}
        className="w-full mt-10 bg-amber-600 text-stone-950 p-5 display text-2xl hover:bg-amber-500 disabled:bg-stone-800 disabled:text-stone-600 transition-colors"
      >
        Save Meal
      </button>

      {scanning && (
        <div className="fixed inset-0 z-50 bg-black flex flex-col">
          <div className="flex items-center justify-between p-4">
            <div className="mono text-xs text-stone-400 tracking-[0.2em] uppercase">Scan barcode</div>
            <button onClick={stopScanner} className="text-stone-400 hover:text-stone-100 p-2" aria-label="Close scanner">
              <X className="w-6 h-6" />
            </button>
          </div>
          <div className="flex-1 relative overflow-hidden">
            <video ref={videoRef} playsInline muted className="absolute inset-0 w-full h-full object-cover" />
            <div className="absolute inset-x-8 top-1/2 -translate-y-1/2 h-24 border-2 border-amber-500/70 rounded pointer-events-none" />
          </div>
          <div className="p-4 space-y-3 bg-stone-950">
            {scanMsg && <div className="mono text-xs text-amber-500">{scanMsg}</div>}
            {!scanMsg && <div className="mono text-xs text-stone-500 text-center">Center the barcode in the frame</div>}
            <div className="flex gap-2">
              <input
                type="number"
                value={manualCode}
                onChange={(e) => setManualCode(e.target.value)}
                placeholder="…or type the barcode number"
                className="flex-1 bg-transparent border-b border-stone-700 py-2 text-sm text-stone-200 focus:border-amber-600 outline-none placeholder:text-stone-700"
              />
              <button
                onClick={() => manualCode.trim() && lookupBarcode(manualCode.trim())}
                disabled={!manualCode.trim()}
                className="mono text-xs tracking-wider uppercase border border-amber-700 text-amber-400 px-4 disabled:opacity-40"
              >
                Look up
              </button>
            </div>
          </div>
        </div>
      )}

      {dayMeals.length > 0 && (
        <div className="mt-10">
          <div className="mono text-xs text-stone-500 tracking-[0.2em] uppercase mb-3">{isBackdated ? 'Entries this day' : "Today's entries"}</div>
          <div className="border border-stone-800 divide-y divide-stone-900">
          {dayMeals.map((m) => (
            <div key={m.id} className="flex items-center justify-between px-4 py-3">
              <div className="min-w-0">
                <div className="text-stone-200 text-sm truncate">{m.name}</div>
                <div className="mono text-[10px] text-stone-500 tracking-wider uppercase">
                  {m.mealType || 'meal'} · {m.calories || 0} cal · {m.protein || 0}g protein{m.carbs ? ` · ${m.carbs}g carbs` : ''}
                </div>
              </div>
              <button
                onClick={() => { if (confirm(`Delete "${m.name}"?`)) onDeleteMeal(m.id); }}
                className="text-stone-600 hover:text-red-400 transition-colors ml-3 shrink-0"
                aria-label="Delete meal"
              >
                <Trash2 className="w-4 h-4" />
              </button>
            </div>
          ))}
          </div>
        </div>
      )}


      {recentFoods.length > 0 && (
        <div className="mt-10">
            <div className="mono text-xs text-stone-500 tracking-[0.2em] uppercase mb-3">Quick add · Recent</div>
            <div className="flex flex-wrap gap-2">
              {recentFoods.map((rf) => (
                <button
                  key={rf.name}
                  onClick={() => {
                    setName(rf.name);
                    setCalories(rf.calories != null ? String(rf.calories) : '');
                    setProtein(rf.protein != null ? String(rf.protein) : '');
                    setCarbs(rf.carbs != null ? String(rf.carbs) : '');
                    if (rf.mealType) setMealType(rf.mealType);
                  }}
                  className="border border-stone-800 text-stone-300 mono text-xs px-3 py-2 hover:border-amber-700 hover:text-amber-400 transition-colors"
                >
                  {rf.name} <span className="text-stone-600">· {rf.calories || 0} cal</span>
                </button>
              ))}
            </div>
          </div>
        )}


      {/* Recipe quick-pick */}
      {recipes.length > 0 && (
        <div className="mt-10 mb-8">
          <div className="flex items-center justify-between mb-3">
            <div className="mono text-xs text-stone-500 tracking-[0.2em] uppercase">Your recipes</div>
            <button onClick={onManageRecipes} className="mono text-xs text-amber-600 tracking-wider uppercase hover:text-amber-400">
              Manage
            </button>
          </div>
          <div className="flex gap-2 mb-3">
            {['all', 'lunch', 'dinner', 'snack'].map(f => (
              <button
                key={f}
                onClick={() => setRecipeFilter(f)}
                className={`mono text-xs tracking-wider uppercase px-2 py-1 border ${recipeFilter === f ? 'border-amber-600 text-amber-400' : 'border-stone-800 text-stone-500'}`}
              >
                {f}
              </button>
            ))}
          </div>
          <div className="relative mb-3">
            <input
              type="text"
              value={recipeQuery}
              onChange={(e) => setRecipeQuery(e.target.value)}
              placeholder="Search recipes…"
              className="w-full bg-transparent border-b border-stone-700 py-2 pr-8 text-sm focus:border-amber-600 outline-none placeholder:text-stone-700"
            />
            {recipeQuery && (
              <button
                onClick={() => setRecipeQuery('')}
                className="absolute right-0 top-1/2 -translate-y-1/2 text-stone-600 hover:text-stone-300"
                aria-label="Clear recipe search"
              >
                <X className="w-4 h-4" />
              </button>
            )}
          </div>
          {topRecipes.length === 0 && (
            <div className="mono text-xs text-stone-600 mb-2">No recipes match.</div>
          )}
          <div className="space-y-2">
            {topRecipes.map(recipe => (
              <button
                key={recipe.id}
                onClick={() => onUseRecipe(recipe)}
                className="w-full border border-stone-800 hover:border-amber-600 hover:bg-amber-950/20 p-4 text-left flex items-start gap-3 transition-colors"
              >
                <BookOpen className="w-4 h-4 text-amber-600 flex-shrink-0 mt-1" />
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2">
                    <span className="text-stone-100 truncate">{recipe.name}</span>
                    {recipe.favorite && <Star className="w-3 h-3 fill-amber-500 text-amber-500 flex-shrink-0" />}
                  </div>
                  <div className="mono text-xs text-stone-500 mt-1">
                    {recipe.calories} cal · {recipe.protein}g protein · {recipe.mealType}
                    {recipe.uses > 0 ? ` · ${recipe.uses}×` : ''}
                  </div>
                </div>
                <ChevronRight className="w-4 h-4 text-stone-600 flex-shrink-0 mt-1" />
              </button>
            ))}
          </div>
        </div>
      )}

    </div>
  );
}

function ProgressView({ workoutLogs, walkLogs, weighIns, mealLogs, onBack }) {
  const [tab, setTab] = useState('overview');
  const [expandedId, setExpandedId] = useState(null);

  // Calculate stats
  const totalWorkouts = workoutLogs.length;
  const totalWalkMiles = walkLogs.reduce((s, w) => s + w.miles, 0);
  const firstWeight = weighIns[weighIns.length - 1];
  const latestWeight = weighIns[0];
  const weightChange = firstWeight && latestWeight ? (latestWeight.weight - firstWeight.weight).toFixed(1) : null;

  // Get progression for each exercise
  const exerciseProgressions = {};
  [...workoutLogs].reverse().forEach(log => {
    log.exercises.forEach(ex => {
      if (!exerciseProgressions[ex.id]) exerciseProgressions[ex.id] = { name: ex.name, sessions: [] };
      const topSet = ex.sets.reduce((max, s) => s.weight > max.weight ? s : max, { weight: 0, reps: 0 });
      exerciseProgressions[ex.id].sessions.push({ date: log.date, weight: topSet.weight, reps: topSet.reps });
    });
  });

  return (
    <div className="px-6 pt-8">

                  <div className="mono text-xs text-stone-600">{formatDate(item.date)}</div>

                  <div className="pb-4 pl-7 space-y-2">

}

function WeightChart({ weighIns }) {
  const [range, setRange] = useState('all');
  const [sel, setSel] = useState(null); // tapped point index
  const RANGES = [
    { key: 'w', label: 'W', days: 7 },
    { key: 'm', label: 'M', days: 30 },
    { key: 'q', label: '3M', days: 90 },
    { key: 'y', label: 'Y', days: 365 },
    { key: 'all', label: 'ALL', days: null },
  ];

  const valid = weighIns
    .map((w) => ({
      weight: typeof w.weight === 'string' ? parseFloat(w.weight) : w.weight,
      ts: w.timestamp || (w.date ? Date.parse(w.date + 'T12:00:00') : NaN),
    }))
    .filter((w) => Number.isFinite(w.weight) && Number.isFinite(w.ts))
    .sort((a, b) => a.ts - b.ts);

  const days = RANGES.find((r) => r.key === range)?.days;
  const cutoff = days ? Date.now() - days * 86400000 : -Infinity;
  const data = valid.filter((w) => w.ts >= cutoff);

  const width = 300;
  const height = 120;
  const padY = 8;

  // Catmull-Rom -> cubic Bezier: smooth curve through every point
  const smoothPath = (pts) => {
    if (pts.length < 2) return '';
    let d = `M ${pts[0].x.toFixed(1)} ${pts[0].y.toFixed(1)}`;
    for (let i = 0; i < pts.length - 1; i++) {
      const p0 = pts[i - 1] || pts[i];
      const p1 = pts[i];
      const p2 = pts[i + 1];
      const p3 = pts[i + 2] || p2;
      const c1x = p1.x + (p2.x - p0.x) / 6;
      const c1y = p1.y + (p2.y - p0.y) / 6;
      const c2x = p2.x - (p3.x - p1.x) / 6;
      const c2y = p2.y - (p3.y - p1.y) / 6;
      d += ` C ${c1x.toFixed(1)} ${c1y.toFixed(1)}, ${c2x.toFixed(1)} ${c2y.toFixed(1)}, ${p2.x.toFixed(1)} ${p2.y.toFixed(1)}`;
    }
    return d;
  };

  let body;
  if (data.length < 2) {
    body = (
      <div className="h-32 flex items-center justify-center mono text-xs text-stone-600">
        {valid.length < 2 ? 'Log a couple of weigh-ins to see the trend.' : 'Not enough entries in this range.'}
      </div>
    );
  } else {
    const weights = data.map((w) => w.weight);
    const min = Math.min(...weights) - 2;
    const max = Math.max(...weights) + 2;
    const span = max - min || 1;
    const t0 = data[0].ts;
    const t1 = data[data.length - 1].ts;
    const tSpan = t1 - t0 || 1;

    const coords = data.map((w) => ({
      x: ((w.ts - t0) / tSpan) * width,
      y: height - padY - ((w.weight - min) / span) * (height - padY * 2),
    }));
    const delta = (data[data.length - 1].weight - data[0].weight).toFixed(1);
    const selPt = sel != null && data[sel] ? data[sel] : null;

    body = (
      <>
        <div className="flex justify-between mono text-xs text-stone-600 mb-1">
          <span>{Math.round(max)} lb</span>
          {selPt ? (
            <span className="text-amber-400">
              {new Date(selPt.ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} · {selPt.weight} lb
            </span>
          ) : (
            <span className={delta <= 0 ? 'text-emerald-500' : 'text-amber-500'}>
              {delta > 0 ? '+' : ''}{delta} lb this range
            </span>
          )}
        </div>
        <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-32" preserveAspectRatio="none">
          <path d={smoothPath(coords)} fill="none" stroke="#d97706" strokeWidth="2" vectorEffect="non-scaling-stroke" />
          {coords.map((c, i) => (
            <g key={i} onClick={() => setSel(sel === i ? null : i)} style={{ cursor: 'pointer' }}>
              {/* generous invisible tap target */}
              <circle cx={c.x} cy={c.y} r="14" fill="transparent" />
              <circle cx={c.x} cy={c.y} r={sel === i ? 5 : 3} fill={sel === i ? '#fbbf24' : '#d97706'} />
            </g>
          ))}
        </svg>
        <div className="flex justify-between mono text-xs text-stone-600 mt-1">
          <span>{Math.round(min)} lb</span>
        </div>
        <div className="flex justify-between mono text-xs text-stone-600 mt-1">
          <span>{new Date(data[0].ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</span>
          <span>{new Date(data[data.length - 1].ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</span>
        </div>
      </>
    );
  }

  return (
    <div className="border border-stone-800 p-5">
      <div className="flex items-center justify-between mb-4">
        <div className="mono text-xs text-stone-500 tracking-wider uppercase">Weight trend</div>
        <div className="flex gap-1">
          {RANGES.map((r) => (
            <button
              key={r.key}
              onClick={() => { setRange(r.key); setSel(null); }}
              className={`mono text-[10px] tracking-wider px-2 py-1 border transition-colors ${
                range === r.key
                  ? 'border-amber-700 text-amber-400'
                  : 'border-stone-800 text-stone-500 hover:text-stone-300'
              }`}
            >
              {r.label}
            </button>
          ))}
        </div>
      </div>
      {body}
    </div>
  );
}
