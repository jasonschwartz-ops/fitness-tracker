function RecipeEditor({ recipe, onSave, onCancel }) {
  const [name, setName] = useState(recipe?.name || '');
  const [calories, setCalories] = useState(recipe?.calories?.toString() || '');
  const [protein, setProtein] = useState(recipe?.protein?.toString() || '');
  const [rCarbs, setRCarbs] = useState(recipe?.carbs?.toString() || '');
  const [mealType, setMealType] = useState(recipe?.mealType || 'lunch');
  const [notes, setNotes] = useState(recipe?.notes || '');
  const [ingredients, setIngredients] = useState(recipe?.ingredients || []);

  // ---- Ingredient nutrition lookup ----
  const [iq, setIq] = useState('');
  const [iResults, setIResults] = useState([]);
  const [iSearching, setISearching] = useState(false);
  const [iError, setIError] = useState('');
  const [iGrams, setIGrams] = useState({});      // idx -> grams string
  const [iPortions, setIPortions] = useState({}); // idx -> [{label, grams}]
  const [iPortLoading, setIPortLoading] = useState({});

  const runIngredientSearch = async () => {
    const q = iq.trim();
    if (!q) return;
    setISearching(true); setIError(''); setIResults([]);
    setIGrams({}); setIPortions({}); setIPortLoading({});
    try {
      const data = await authedFetch('/nutrition/search?q=' + encodeURIComponent(q));
      const products = (data.foods || [])
        .map(f => ({
          fdcId: f.fdcId,
          name: [f.description, f.brand ? `(${f.brand})` : ''].filter(Boolean).join(' ').trim(),
          kcal100: f.calories != null ? f.calories : null,
          protein100: f.protein != null ? f.protein : null,
          carbs100: f.carbs != null ? f.carbs : null,
        }))
        .filter(p => p.name && p.kcal100 != null);
      if (!products.length) setIError('No matches. Try a simpler term.');
      setIResults(products.slice(0, 8));
    } catch (e) {
      setIError('Lookup failed: ' + e.message);
    }
    setISearching(false);
  };

  const loadIngredientPortions = async (r, idx) => {
    if (!r.fdcId || iPortions[idx]) return;
    setIPortLoading(p => ({ ...p, [idx]: true }));
    try {
      const d = await authedFetch('/nutrition/food/' + r.fdcId);
      setIPortions(p => ({ ...p, [idx]: d.portions || [] }));
      if ((d.portions || []).length > 0) {
        setIGrams(g => ({ ...g, [idx]: String(Math.round(d.portions[0].grams)) }));
      }
    } catch (e) {
      setIPortions(p => ({ ...p, [idx]: [] }));
    }
    setIPortLoading(p => ({ ...p, [idx]: false }));
  };

  const addIngredient = (r, idx) => {
    const grams = parseFloat(iGrams[idx]) || 100;
    const factor = grams / 100;
    const item = {
      name: r.name,
      grams,
      calories: Math.round((r.kcal100 || 0) * factor),
      protein: Math.round((r.protein100 || 0) * factor),
      carbs: Math.round((r.carbs100 || 0) * factor),
    };
    const next = [...ingredients, item];
    setIngredients(next);
    applyTotals(next);
  };

  const removeIngredient = (i) => {
    const next = ingredients.filter((_, x) => x !== i);
    setIngredients(next);
    if (next.length > 0) applyTotals(next);
  };

  // Auto-fill the macro fields from ingredient totals (still hand-editable after)
  const applyTotals = (list) => {
    setCalories(String(list.reduce((s, x) => s + (x.calories || 0), 0)));
    setProtein(String(list.reduce((s, x) => s + (x.protein || 0), 0)));
    setRCarbs(String(list.reduce((s, x) => s + (x.carbs || 0), 0)));
  };

  return (
    <div className="px-6 pt-8">
      <button onClick={onCancel} className="mono text-xs text-stone-500 tracking-wider uppercase mb-4 flex items-center gap-2 hover:text-stone-300">
        <X className="w-3 h-3" /> Cancel
      </button>
      <h1 className="display text-5xl mb-8">{recipe ? 'Edit' : 'New'} recipe.</h1>

      <div className="space-y-6">
        <Field label="Name">
          <input
            type="text"
            value={name}
            onChange={(e) => setName(e.target.value)}
            placeholder="e.g. Grilled salmon bowl"
            className="w-full bg-transparent border-b border-stone-700 text-xl py-3 focus:border-amber-600 outline-none placeholder:text-stone-700"
          />
        </Field>

        <div>
          <label className="mono text-xs text-stone-500 tracking-wider uppercase mb-2 block">Meal type</label>
          <div className="grid grid-cols-3 gap-2">
            {['lunch', 'dinner', 'snack'].map(type => (
              <button
                key={type}
                onClick={() => setMealType(type)}
                className={`border py-3 mono text-xs tracking-wider uppercase ${mealType === type ? 'border-amber-600 bg-amber-950/40 text-amber-300' : 'border-stone-800 text-stone-500'}`}
              >
                {type}
              </button>
            ))}
          </div>
        </div>

        {/* ---- Ingredient builder ---- */}
        <div className="border border-stone-800 p-4">
          <div className="mono text-xs text-stone-500 tracking-wider uppercase mb-3">Build from ingredients</div>

          {ingredients.length > 0 && (
            <div className="divide-y divide-stone-900 border border-stone-800 mb-4">
              {ingredients.map((ing, i) => (
                <div key={i} className="flex items-center justify-between px-3 py-2">
                  <div className="min-w-0">
                    <div className="text-stone-200 text-sm truncate">{ing.name}</div>
                    <div className="mono text-[10px] text-stone-500">
                      {ing.grams}g · {ing.calories} cal · {ing.protein}g P · {ing.carbs}g C
                    </div>
                  </div>
                  <button onClick={() => removeIngredient(i)} className="text-stone-600 hover:text-red-400 ml-3 shrink-0">
                    <Trash2 className="w-4 h-4" />
                  </button>
                </div>
              ))}
              <div className="px-3 py-2 mono text-[10px] text-amber-500 tracking-wider">
                TOTAL: {ingredients.reduce((s, x) => s + x.calories, 0)} CAL · {ingredients.reduce((s, x) => s + x.protein, 0)}G P · {ingredients.reduce((s, x) => s + x.carbs, 0)}G C
              </div>
            </div>
          )}

          <div className="flex gap-2 mb-3">
            <input
              type="text"
              value={iq}
              onChange={(e) => setIq(e.target.value)}
              onKeyDown={(e) => e.key === 'Enter' && runIngredientSearch()}
              placeholder="e.g. salmon"
              className="flex-1 bg-transparent border-b border-stone-700 py-2 text-sm focus:border-amber-600 outline-none placeholder:text-stone-700"
            />
            <button
              onClick={runIngredientSearch}
              disabled={iSearching}
              className="border border-stone-700 text-stone-300 mono text-xs tracking-wider uppercase px-4 hover:border-amber-700 hover:text-amber-400 disabled:opacity-50"
            >
              {iSearching ? '…' : 'Search'}
            </button>
          </div>
          {iError && <div className="mono text-xs text-stone-600 mb-2">{iError}</div>}

          {iResults.length > 0 && (
            <div className="space-y-2 max-h-72 overflow-y-auto">
              {iResults.map((r, idx) => (
                <div key={idx} className="border border-stone-800 p-3">
                  <div className="text-sm text-stone-200 mb-1">{r.name}</div>
                  <div className="mono text-[10px] text-stone-500 mb-2">
                    per 100g: {Math.round(r.kcal100)} cal · {r.protein100 != null ? Math.round(r.protein100) : '?'}g P · {r.carbs100 != null ? Math.round(r.carbs100) : '?'}g C
                  </div>
                  {iPortions[idx] === undefined && r.fdcId && (
                    <button
                      onClick={() => loadIngredientPortions(r, idx)}
                      disabled={iPortLoading[idx]}
                      className="mono text-[10px] tracking-wider uppercase border border-stone-700 text-stone-400 px-2 py-1 mb-2 hover:border-amber-700 hover:text-amber-400 disabled:opacity-50"
                    >
                      {iPortLoading[idx] ? 'Loading…' : 'Portions'}
                    </button>
                  )}
                  {(iPortions[idx] || []).length > 0 && (
                    <select
                      onChange={(e) => setIGrams(g => ({ ...g, [idx]: e.target.value }))}
                      className="w-full bg-stone-950 border border-stone-700 text-stone-200 mono text-xs py-1 px-2 mb-2 focus:border-amber-600 outline-none"
                    >
                      {(iPortions[idx] || []).map((p, pi) => (
                        <option key={pi} value={Math.round(p.grams)}>{p.label} ({Math.round(p.grams)}g)</option>
                      ))}
                    </select>
                  )}
                  <div className="flex items-center gap-2">
                    <input
                      type="number"
                      value={iGrams[idx] ?? 100}
                      onChange={(e) => setIGrams(g => ({ ...g, [idx]: e.target.value }))}
                      onFocus={(e) => e.target.select()}
                      className="w-20 bg-transparent border border-stone-700 text-center py-1 mono text-sm focus:border-amber-600 outline-none"
                    />
                    <span className="mono text-[10px] text-stone-500 tracking-wider uppercase">grams</span>
                    <button
                      onClick={() => addIngredient(r, idx)}
                      className="ml-auto mono text-xs tracking-wider uppercase border border-amber-700 text-amber-400 px-3 py-1 hover:bg-amber-950/40"
                    >
                      Add
                    </button>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>

        <div className="grid grid-cols-2 gap-4">
          <Field label="Calories">
            <input
              type="number"
              value={calories}
              onChange={(e) => setCalories(e.target.value)}
              className="w-full bg-transparent border-b border-stone-700 text-3xl display py-3 focus:border-amber-600 outline-none"
            />
          </Field>
          <Field label="Protein (g)">
            <input
              type="number"
              value={protein}
              onChange={(e) => setProtein(e.target.value)}
              className="w-full bg-transparent border-b border-stone-700 text-3xl display py-3 focus:border-amber-600 outline-none"
            />
          </Field>
          <Field label="Carbs (g)">
            <input
              type="number"
              value={rCarbs}
              onChange={(e) => setRCarbs(e.target.value)}
              className="w-full bg-transparent border-b border-stone-700 text-3xl display py-3 focus:border-amber-600 outline-none"
            />
          </Field>
        </div>

        <Field label="Notes (prep, substitutions, etc.)">
          <textarea
            value={notes}
            onChange={(e) => setNotes(e.target.value)}
            placeholder="e.g. grill salmon 4 min/side; swap quinoa for rice"
            rows={4}
            className="w-full bg-transparent border border-stone-700 p-3 text-sm focus:border-amber-600 outline-none placeholder:text-stone-700 resize-none"
          />
        </Field>
      </div>

      <button
        onClick={() => onSave({
          id: recipe?.id,
          name,
          calories: parseInt(calories) || 0,
          protein: parseInt(protein) || 0,
          carbs: parseInt(rCarbs) || 0,
          mealType,
          notes,
          ingredients,
        })}
        disabled={!name}
        className="w-full mt-10 bg-amber-600 text-stone-950 p-5 display text-2xl hover:bg-amber-500 disabled:bg-stone-800 disabled:text-stone-600 transition-colors"
      >
        {recipe ? 'Save Changes' : 'Save Recipe'}
      </button>
    </div>
  );
}

function RoutesView({ routes, onSave, onDelete, onToggleFavorite, onBack }) {
  const [editing, setEditing] = useState(null);

  if (editing) {
    return (
      <RouteEditor
        route={editing === 'new' ? null : editing}
        onSave={async (r) => { await onSave(r); setEditing(null); }}
        onCancel={() => setEditing(null)}
      />
    );
  }

  return (
    <div className="px-6 pt-8">
      <button onClick={onBack} className="mono text-xs text-stone-500 tracking-wider uppercase mb-4 hover:text-stone-300">← Back</button>
      <div className="flex items-start justify-between mb-8">
        <h1 className="display text-5xl">Routes.</h1>
        <button
          onClick={() => setEditing('new')}
          className="mt-3 border border-emerald-700 text-emerald-400 p-2 hover:bg-emerald-950/40"
          aria-label="Add route"
        >
          <Plus className="w-4 h-4" />
        </button>
      </div>

      {routes.length === 0 && (
        <div className="text-stone-500 italic text-sm">No routes yet. Tap + to add one.</div>
      )}

      <div className="space-y-3">
        {routes.map(route => (
          <div key={route.id} className="border border-stone-800 p-4">
            <div className="flex items-start justify-between gap-3">
              <button
                onClick={() => setEditing(route)}
                className="flex-1 text-left min-w-0"
              >
                <div className="flex items-center gap-2 mb-1">
                  <MapPin className="w-4 h-4 text-emerald-600 flex-shrink-0" />
                  <span className="text-stone-100 text-lg">{route.name}</span>
                </div>
                <div className="mono text-xs text-stone-500 ml-6">
                  {route.miles} mi · {route.minutes} min · est. {Math.round(route.miles * STEPS_PER_MILE).toLocaleString()} steps
                  {route.uses > 0 ? ` · walked ${route.uses}×` : ''}
                </div>
                {route.notes && (
                  <div className="text-xs text-stone-400 mt-2 italic ml-6">{route.notes}</div>
                )}
              </button>
              <div className="flex flex-col gap-2">
                <button
                  onClick={() => onToggleFavorite(route.id)}
                  className="p-1 text-stone-500 hover:text-amber-500"
                  aria-label="Toggle favorite"
                >
                  <Star className={`w-4 h-4 ${route.favorite ? 'fill-amber-500 text-amber-500' : ''}`} />
                </button>
                <button
                  onClick={() => { if (confirm(`Delete "${route.name}"?`)) onDelete(route.id); }}
                  className="p-1 text-stone-600 hover:text-red-500"
                  aria-label="Delete"
                >
                  <Trash2 className="w-4 h-4" />
                </button>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function RouteEditor({ route, onSave, onCancel }) {
  const [name, setName] = useState(route?.name || '');
  const [miles, setMiles] = useState(route?.miles?.toString() || '3');
  const [minutes, setMinutes] = useState(route?.minutes?.toString() || '55');
  const [notes, setNotes] = useState(route?.notes || '');

  const pace = miles && minutes ? (parseFloat(minutes) / parseFloat(miles)).toFixed(1) : '—';

  return (
    <div className="px-6 pt-8">
      <button onClick={onCancel} className="mono text-xs text-stone-500 tracking-wider uppercase mb-4 flex items-center gap-2 hover:text-stone-300">
        <X className="w-3 h-3" /> Cancel
      </button>
      <h1 className="display text-5xl mb-8">{route ? 'Edit' : 'New'} route.</h1>

      <div className="space-y-6">
        <Field label="Name">
          <input
            type="text"
            value={name}
            onChange={(e) => setName(e.target.value)}
            placeholder="e.g. Park loop"
            className="w-full bg-transparent border-b border-stone-700 text-xl py-3 focus:border-emerald-600 outline-none placeholder:text-stone-700"
          />
        </Field>

        <div className="grid grid-cols-2 gap-4">
          <Field label="Miles">
            <input
              type="number"
              step="0.1"
              value={miles}
              onChange={(e) => setMiles(e.target.value)}
              className="w-full bg-transparent border-b border-stone-700 text-3xl display py-3 focus:border-emerald-600 outline-none"
            />
          </Field>
          <Field label="Minutes">
            <input
              type="number"
              value={minutes}
              onChange={(e) => setMinutes(e.target.value)}
              className="w-full bg-transparent border-b border-stone-700 text-3xl display py-3 focus:border-emerald-600 outline-none"
            />
          </Field>
        </div>

        <div className="mono text-xs text-stone-500">
          Pace: {pace} min/mile · ≈ {miles ? Math.round(parseFloat(miles) * STEPS_PER_MILE).toLocaleString() : '—'} steps
        </div>

        <Field label="Notes">
          <textarea
            value={notes}
            onChange={(e) => setNotes(e.target.value)}
            placeholder="e.g. Down Main St, left at park, loop around"
            rows={4}
            className="w-full bg-transparent border border-stone-700 p-3 text-sm focus:border-emerald-600 outline-none placeholder:text-stone-700 resize-none"
          />
        </Field>
      </div>

      <button
        onClick={() => onSave({
          id: route?.id,
          name,
          miles: parseFloat(miles) || 0,
          minutes: parseInt(minutes) || 0,
          notes,
        })}
        disabled={!name || !miles}
        className="w-full mt-10 bg-emerald-700 text-stone-100 p-5 display text-2xl hover:bg-emerald-600 disabled:bg-stone-800 disabled:text-stone-600 transition-colors"
      >
        {route ? 'Save Changes' : 'Save Route'}
      </button>
    </div>
  );
}

function Field({ label, children }) {
  return (
    <div>
      <label className="mono text-xs text-stone-500 tracking-wider uppercase mb-2 block">{label}</label>
      {children}
    </div>
  );
}

function formatDate(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}


// === END APP ===

function SignInScreen({ onSignIn, error, busy }) {
  return (
    <div className="min-h-screen flex flex-col items-center justify-center px-8 grain">
      <div className="mono text-xs text-stone-500 tracking-[0.3em] uppercase mb-3">Tracker</div>
      <h1 className="display text-5xl text-stone-100 mb-2 text-center">Train. Eat. Log.</h1>
      <p className="mono text-xs text-stone-500 tracking-wider text-center mb-10">
        Sign in to sync across your devices.
      </p>
      <button
        onClick={onSignIn}
        disabled={busy}
        className="border border-stone-700 text-stone-200 mono text-sm tracking-wider uppercase px-8 py-4 hover:bg-stone-900 transition-colors disabled:opacity-50"
      >
        {busy ? 'Signing in…' : 'Sign in with Google'}
      </button>
      {error && <div className="mono text-xs text-red-400 mt-6 text-center max-w-xs">{error}</div>}
    </div>
  );
}

function Root() {
  const [user, setUser] = useState(undefined); // undefined = auth state loading
  const [ready, setReady] = useState(false);   // sync complete
  const [error, setError] = useState('');
  const [busy, setBusy] = useState(false);

  useEffect(() => {
    firebase.auth().getRedirectResult().catch((e) => setError(e.message));
    return firebase.auth().onAuthStateChanged((u) => setUser(u));
  }, []);

  useEffect(() => {
    if (!user) return;
    (async () => {
      try {
        await syncFromServer();
      } catch (e) {
        console.warn('Sync failed, serving cached data:', e.message);
      }
      flushQueue();
      setReady(true);
    })();
  }, [user]);

  const signIn = async () => {
    setBusy(true); setError('');
    const provider = new firebase.auth.GoogleAuthProvider();
    try {
      await firebase.auth().signInWithPopup(provider);
    } catch (e) {
      // Popups are unreliable in installed/standalone PWAs — fall back to redirect
      if (['auth/popup-blocked', 'auth/popup-closed-by-user', 'auth/operation-not-supported-in-this-environment', 'auth/cancelled-popup-request'].includes(e.code)) {
        try { await firebase.auth().signInWithRedirect(provider); } catch (e2) { setError(e2.message); }
      } else {
        setError(e.message);
      }
    }
    setBusy(false);
  };

  if (user === undefined) {
    return <div className="min-h-screen flex items-center justify-center mono text-xs text-stone-600 tracking-[0.3em] uppercase">Loading…</div>;
  }
  if (!user) return <SignInScreen onSignIn={signIn} error={error} busy={busy} />;
  if (!ready) {
    return <div className="min-h-screen flex items-center justify-center mono text-xs text-stone-600 tracking-[0.3em] uppercase">Syncing…</div>;
  }
  return <FitnessTracker />;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Root />);
